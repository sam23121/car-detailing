name: Prod Lambda Deployment

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/lambda_deployment.yml'

env:
  #ECR repo name
  ecrreponame: car-detailing
  #Docker tag
  tag: latest
  lambda_function_name: car-detailing

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push docker image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: ${{ env.ecrreponame }}
        IMAGE_TAG: ${{ env.tag }} 
      run: |
        cd backend
        docker build -f Dockerfile.lambda --build-arg AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID --build-arg AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

    - name: Update Lambda function code
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ env.ecrreponame }}
        IMAGE_TAG: ${{ env.tag }}
      run: |
        IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        aws lambda update-function-code --function-name ${{ env.lambda_function_name }} --image-uri $IMAGE_URI

    - name: Delete old ECR images (keep last 2)
      env:
        REPOSITORY: ${{ env.ecrreponame }}
        AWS_REGION: us-east-1
      run: |
        # List images newest first, skip first 2 (keep them), delete the rest
        IMAGES_JSON=$(aws ecr describe-images --repository-name $REPOSITORY --region $AWS_REGION --query 'sort_by(imageDetails,& imagePushedAt)[::-1]' --output json)
        IMAGE_COUNT=$(echo "$IMAGES_JSON" | jq '. | length')
        if [ "$IMAGE_COUNT" -gt 2 ]; then
          # Get digests of all images except the 2 most recent
          OLD_DIGESTS=$(echo "$IMAGES_JSON" | jq -r '.[2:] | .[].imageDigest')
          echo "Deleting $((IMAGE_COUNT - 2)) old image(s)"
          for digest in $OLD_DIGESTS; do
            aws ecr batch-delete-image --repository-name $REPOSITORY --image-ids imageDigest=$digest --region $AWS_REGION
          done
        else
          echo "Only $IMAGE_COUNT image(s), keeping all (no cleanup needed)"
        fi